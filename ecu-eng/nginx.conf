server {
    listen 80;
    server_name _;

    # ── Allow large ECU dump file uploads (up to 15 MB) ─────────────────────
    client_max_body_size 15m;

    # ── API reverse proxy ────────────────────────────────────────────────────
    # All requests to /api/* are forwarded to the backend container.
    # The service name "backend" resolves via Docker's internal DNS.
    location /api/ {
        proxy_pass         http://backend:5000/api/;

        # Preserve original request metadata
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Rewrite cookie path so httpOnly / sameSite cookies set by Express
        # survive the proxy boundary without path mismatch issues
        proxy_cookie_path  /  /;

        # WebSocket upgrade support (future-proof)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Static frontend (React SPA) ──────────────────────────────────────────
    # Serve pre-built assets; fall back to index.html for client-side routing.
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
